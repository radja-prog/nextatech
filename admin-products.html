<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background-color: black;
            margin: 0;

        }

        .header {
            color: white;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            margin-left: 20px;
            margin-right: 20px;


        }
         .header h1{
            margin-bottom: 5px;
         }
        .subtitle {
            font-size: 14px;
            font-weight: normal;
            color: #9ca3af;
            font-family: Arial, sans-serif;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .box {
            width: fit-content;
            height: 100vh;
            background-color: rgb(17, 17, 58);
            position: absolute;
            text-align: left;

        }

        .menu_icon_box {
            width: 15px;
            height: 15px;
            margin: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            position: relative;
        }

        .menu_icon_box div {
            height: 3px;
            background-color: rgb(179, 177, 177);
            border-radius: 2px;
            transition: all 0.3s ease;
        }


        .menu_icon_box.active .line1 {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu_icon_box.active .line2 {
            opacity: 0;
        }

        .menu_icon_box.active .line3 {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background-color: #0f1722;
            align-items: center;
            color:white;

        }

        .navbar .menu_icon_box {
            margin-right: 20px;
        }

        .navbar .nav-title {
            margin-right: auto;
        }

        .navbar p {
            margin-right: 20px;
        }

        .logout {
            padding: 4px;
            background-color: #f1f1f3;
            border: none;
            font-size: 15px;
            height: 30px;
            border-radius: 5px;
            color: #cccaca;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .logout:hover {
            background-color: #1f2937;
        }

        .logout:active {
            background-color: #1f2937;
        }

        .filter-bar {
            padding: 20px;
            height: 40px;
            background-color: #182435;
            border-radius: 15px;
            border: 1px solid rgb(129, 127, 127);
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;


        }

        .filter-bar input {
            border: 1px solid rgb(170, 168, 168);
            border-radius: 10px;
            background-color: #253449;
            padding: 10px;
            flex: 1;


        }

        .filter-bar select {
            border: 1px solid white;
            border-radius: 10px;
            background-color: #253449;
            padding: 10px;
            color: white;
            flex: 1;

        }

        .add-product {
            margin-top: auto;
            padding: 20px;
            width: 400px;
            margin-left: 100px;
            background-color: #182435;
            border-radius: 10px;
            border: 1px solid rgb(165, 163, 163);
            background-color: #0f1722;
            color: white;
        }

        .add-product:hover {
            background-color: black;
        }

        .add-product:active {
            background-color: black;
        }
    </style>
</head>

<body>


    <div class="navbar">
        <nav>
            <div class="menu_icon_box">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
        <h1 class="nav-title">NexaTech</h1>
        <p>Admin User</p>
        <button class="logout">Logout</button>

    </div>
    <div class="header">
        <div>
            <h1 >Product Management</h1>
            <p class="subtitle">Manage your product inventory</p>
            <div class="filter-bar">
                <input type="text" id="search" placeholder="search products..." />
                <select id="categoryfilter">
                    <option value="all categories">All Categories</option>
                    <option value="smartphone">Smartphones</option>
                    <option value="laptops">Laptops</option>
                    <option value="tablets">Tablets</option>
                    <option value="accessories">Accessories</option>
                </select>

                <select id="Brandfilter">
                    <option value="all Brands">All Brands</option>
                    <option value="apple">Apple</option>
                    <option value="Sumsung">Sumsung</option>
                    <option value="Dell">Dell</option>
                    <option value="Assus">Assus</option>
                </select>

            </div>
            <div id="productlist">



            </div>
            <button class="add-product">
                + Add Product
            </button>


        </div>
    </div>

</body>

</html>
