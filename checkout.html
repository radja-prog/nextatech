<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0c0a22;
        }

        .header {
            color: rgb(255, 255, 255);
            margin-bottom: 30px;

        }

        .card {
            background: rgb(240, 240, 240);
            padding: 30px;
            border-radius: 5px;
            width: 1100px;


        }

        .card p {
            margin: 5px 0 5px 0;
            font-size: 14px;
        }

        .card input {
            width: 98%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        .payment-method {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .payment-box {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .payment-box input {
            width: auto;
        }

        .payment-box p {
            margin: 3px 0 0 0;
            color: gray;
            font-size: 13px;
        }


        .payment-box:has(input:checked) {
            border-color: #2563eb;
            background-color: #f0f5ff;
        }

        .button {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            margin-top: 20px;
        }

        .order {
            background: rgb(240, 240, 240);
            padding: 30px;
            border-radius: 5px;
            width: 1100px;
            margin-top: 30px;


        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

    </style>
</head>
<div>
    <div class="header">
        <h1>Checkout</h1>
    </div>

    <div class="card">
        <h2>Customer Information </h2>
        <p>Full Name</p>
        <input type="text" placeholder="Enter your full name">
        <p>Phone Number</p>
        <input type="number" placeholder="Enter your phone number">
        <p>Address</p>
        <input type="text" placeholder="Street address">
        <p>City</p>
        <input type="text" placeholder="City name">
        <div class="payment-method">

            <label class="payment-box">
                <input type="radio" name="payment" checked>
                <div>
                    <strong>Cash on Delivery</strong>
                    <p>Pay when you receive your order</p>
                </div>
            </label>

            <label class="payment-box">
                <input type="radio" name="payment">
                <div>
                    <strong>Credit/Debit Card</strong>
                    <p>Pay securely online</p>
                </div>
            </label>

        </div>
        <button class="button">Place Order</button>
    </div>
    <div class="order">
        <h2>Order Summary</h2>
        <hr />
        <div class="row">
            <span>SubTotal :</span>
            <span>0$</span>
        </div>

        <div class="row">
            <span>Shipping :</span>
            <span>0$</span>
        </div>

        <div class="row">
            <span>Tax :</span>
            <span>0$</span>
        </div>
        <hr />
        <div class="row">
            <h2>Total :</h2>
            <h2>0$</h2>
        </div>
        

    </div>


</div>



</html>
