<!DOCTYPE html>
<html>


<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            height: 100%;
            margin: 0;
            padding-top: 8%;
        }

        hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 96%;
            height: 8%;
            z-index: 100;
            background-color: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: #4da6ff;
            font-size: 22px;
        }

        .navbar a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #4da6ff;
        }


        #cart-items {
            min-height: 80px;
        }

        .cart {
            position: fixed;
            right: 0;
            top: 10%;
            width: 100%;
            height: 90vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;



        }

        .cart h1 {
            color: white;
        }

        .cart-total {
            margin-top: auto;
            color: white;
        }

        .checkout {
            width: 100%;
            padding: 10px;
            background: rgb(19, 70, 238);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            display: block;
            text-align: center;

        }

        .checkout:hover {
            background-color: rgb(19, 19, 190);
        }

        .checkout:active {
            background-color: rgb(19, 19, 190);
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 10px 12px;
        }

        /* ================= MOBILE ================= */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                height: auto;
                text-align: center;
                padding: 10px;
            }

            .navbar nav {
                margin-top: 10px;
            }

            .navbar a {
                display: block;
                margin: 8px 0;
            }
            .cart {
                top: 12%;
                width: 100%;
                padding: 10px;
            }

            .cart h1 {
                font-size: 20px;
                text-align: center;
            }
            .row {
                flex-direction: column;
                align-items: center;
            }

            
            .checkout {
                width: 100%;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <h2> <i class="fa-solid fa-cubes" style="color:  rgb(17, 29, 187);"></i> NexaTech</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="#">Login</a>
        </nav>
    </header>
    <section class="cart">
        <h1>Shopping Cart</h1>
        <div id="cart-items"></div>
        <hr>
        <div class="cart-total">
            <hr />
            <div class="row">
                <p>Total:</p>
                <p>0$</p>


            </div>
            <a href="checkout.html" class="checkout">checkout</a>

        </div>
    </section>
</body>

</html>
