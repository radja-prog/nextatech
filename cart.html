<!DOCTYPE html>
<html>
 <meta name="viewport" content="width=device-width, initial-scale=1">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            height: 100%;
            margin: 0;
            padding-top: 8%;
        }

        hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 96%;
            height: 8%;
            z-index: 100;
            background-color: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: #4da6ff;
            font-size: 22px;
        }

        .navbar a {
            margin-left: 20px;
            text-decoration: none;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #4da6ff;
        }


        #cart-items {
            min-height: 80px;
        }

        .cart {
            position: fixed;
            right: 0;
            top: 10%;
            width: 100%;
            height: 90vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;



        }

        .cart h1 {
            color: white;
        }

        .cart-total {
            margin-top: auto;
            color: white;
        }

        .checkout {
            width: 100%;
            padding: 10px;
            background: rgb(19, 70, 238);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .checkout a {
            color: white;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h2> <i class="fa-solid fa-cubes" style="color:  rgb(17, 29, 187);"></i> NexaTech</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="product.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="admin-login.html">Login</a>
        </nav>
    </div>
    <div class="cart">
        <h1>Shopping Cart</h1>
        <div id="cart-items"></div>
        <hr>
        <div class="cart-total">
            <hr />
            <div class="row">
                <p>Total:</p>
                <p>0$</p>


            </div>
             <button class="checkout"> <a href="checkout.html" >checkout</a></button> 

        </div>
    </div>
</body>

</html>
